<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>研究雷达 · Research Radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EBE9E2; --card:#FCFBF8; --ink:#23201B; --ink-soft:#6E695E; --line:#DBD8CF;
    --accent:#B23A2E; --accent-tint:#F3E2DE; --green:#2F5D4E; --green-tint:#E2ECE7;
    --serif:'Spectral',Georgia,'Songti SC',serif;
    --sans:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei','Noto Sans SC',Segoe UI,Roboto,sans-serif;
    --shadow:0 1px 2px rgba(35,32,27,.04),0 6px 20px rgba(35,32,27,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.6;font-size:15px;-webkit-font-smoothing:antialiased;min-height:100vh}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  .shell{display:grid;grid-template-columns:270px 1fr;max-width:1180px;margin:0 auto;min-height:100vh}
  .side{border-right:1px solid var(--line);padding:30px 26px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:24px;overflow:auto}
  .brand .mark{display:flex;align-items:center;gap:9px}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:var(--accent);position:relative;flex:none}
  .brand .dot::after{content:"";position:absolute;inset:-6px;border:1px solid var(--accent);border-radius:50%;opacity:.35;animation:pulse 2.6s ease-out infinite}
  @keyframes pulse{0%{transform:scale(.6);opacity:.5}100%{transform:scale(1.5);opacity:0}}
  .brand h1{font-family:var(--serif);font-weight:600;font-size:21px}
  .brand .en{font-family:var(--serif);font-style:italic;color:var(--ink-soft);font-size:13px}
  .eyebrow{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin-bottom:11px}

  nav.tabs{display:flex;flex-direction:column;gap:2px}
  .tab{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 12px;border-radius:9px;cursor:pointer;color:var(--ink-soft);font-weight:500;font-size:14.5px;border:none;background:none;width:100%;text-align:left;transition:.15s;font-family:var(--sans)}
  .tab:hover{background:#fff;color:var(--ink)}
  .tab.active{background:var(--ink);color:#fff}
  .tab .badge{font-size:11.5px;background:var(--accent-tint);color:var(--accent);padding:1px 8px;border-radius:20px;font-weight:600}
  .tab.active .badge{background:rgba(255,255,255,.2);color:#fff}

  .topics{display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-size:12px;padding:4px 10px;border:1px solid var(--line);border-radius:20px;cursor:pointer;background:var(--card);color:var(--ink-soft);transition:.15s;user-select:none}
  .chip:hover{border-color:var(--accent);color:var(--accent)}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .datanote{font-size:11.5px;color:var(--ink-soft);line-height:1.5;border-top:1px solid var(--line);padding-top:16px;margin-top:auto}
  .datanote b{color:var(--green)}

  main{padding:34px 40px 80px}
  .head{margin-bottom:22px}
  .head .kick{font-family:var(--serif);font-style:italic;color:var(--accent);font-size:14px;margin-bottom:4px}
  .head h2{font-family:var(--serif);font-weight:600;font-size:27px}
  .head p{color:var(--ink-soft);font-size:13.5px;margin-top:5px;max-width:60ch}
  .head .tools{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}

  .demo-banner{display:flex;gap:10px;align-items:flex-start;background:var(--accent-tint);border:1px solid #E7C9C4;border-radius:11px;padding:11px 14px;margin-bottom:20px;font-size:12.5px;color:#7c2f26;line-height:1.5}
  .demo-banner svg{flex:none;margin-top:1px}

  .feed{display:flex;flex-direction:column;gap:16px}
  .paper{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 22px;box-shadow:var(--shadow);transition:transform .18s,box-shadow .18s;position:relative}
  .paper:hover{transform:translateY(-2px);box-shadow:0 4px 10px rgba(35,32,27,.05),0 14px 34px rgba(35,32,27,.09)}
  .p-top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:12px}
  .meter{flex:none;width:78px;text-align:center}
  .meter .num{font-family:var(--serif);font-size:25px;font-weight:600;line-height:1;color:var(--accent)}
  .meter .num.classic{color:var(--green)}
  .meter .lab{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin-top:3px}
  .bar{height:4px;border-radius:3px;background:var(--line);margin-top:7px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--accent);border-radius:3px}
  .bar i.classic{background:var(--green)}
  .p-body{flex:1;min-width:0}
  .venue{font-size:11.5px;color:var(--ink-soft);margin-bottom:5px}
  .venue .type{display:inline-block;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:1px 7px;border-radius:5px;margin-right:8px;font-weight:600;vertical-align:1px}
  .type.new{background:var(--accent-tint);color:var(--accent)}
  .type.classic{background:var(--green-tint);color:var(--green)}
  .p-title{font-family:var(--serif);font-size:18.5px;font-weight:600;line-height:1.35;margin-bottom:3px}
  .p-title-en{font-family:var(--serif);font-style:italic;font-size:13.5px;color:var(--ink-soft);margin-bottom:11px}
  .authors{font-size:12.5px;color:var(--ink-soft);margin-bottom:12px}

  .langbar{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:11px}
  .langbar button{border:none;background:var(--card);color:var(--ink-soft);font-family:var(--sans);font-size:12px;padding:4px 11px;cursor:pointer;border-right:1px solid var(--line)}
  .langbar button:last-child{border-right:none}
  .langbar button.on{background:var(--ink);color:#fff}

  .abstract{font-size:14px;color:#3a362e;margin-bottom:6px}
  .abstract .en{font-family:var(--serif);font-style:italic;color:var(--ink-soft);display:block;margin-bottom:7px}
  .why{display:flex;gap:9px;align-items:flex-start;background:#F6F3EC;border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:9px 13px;font-size:13px;color:#4a453b;margin:12px 0 14px}
  .why b{color:var(--accent);font-weight:600;font-style:normal;white-space:nowrap}
  .paper.is-classic .why{border-left-color:var(--green)}
  .paper.is-classic .why b{color:var(--green)}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:15px}
  .tags span{font-size:11px;color:var(--ink-soft);background:#F0EEE7;padding:2px 9px;border-radius:6px}

  .p-actions{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
  .btn{font-family:var(--sans);font-size:13px;font-weight:500;padding:7px 14px;border-radius:8px;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink);transition:.15s;display:inline-flex;align-items:center;gap:6px}
  .btn:hover{border-color:var(--ink)}
  .btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .btn.primary:hover{background:#000}
  .btn.fav.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.small{font-size:12px;padding:5px 11px}
  .btn svg{flex:none}

  .empty{text-align:center;padding:70px 20px;color:var(--ink-soft)}
  .empty .big{font-family:var(--serif);font-style:italic;font-size:20px;color:var(--ink);margin-bottom:8px}
  .empty svg{margin-bottom:18px;opacity:.5}

  /* Reader modal */
  .overlay{position:fixed;inset:0;background:rgba(35,32,27,.44);backdrop-filter:blur(2px);z-index:40;display:none;align-items:flex-start;justify-content:center;padding:30px 18px;overflow:auto}
  .overlay.show{display:flex}
  .reader{background:var(--card);width:100%;max-width:760px;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden;animation:rise .25s ease}
  @keyframes rise{from{transform:translateY(14px);opacity:0}to{transform:none;opacity:1}}
  .r-head{padding:22px 26px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--card);z-index:2}
  .r-head .close{position:absolute;top:18px;right:20px;border:none;background:none;cursor:pointer;color:var(--ink-soft);font-size:22px;line-height:1}
  .r-head .rv{font-size:11.5px;color:var(--ink-soft);margin-bottom:6px}
  .r-head h3{font-family:var(--serif);font-size:20px;font-weight:600;line-height:1.3;padding-right:30px}
  .r-head .rh-en{font-family:var(--serif);font-style:italic;color:var(--ink-soft);font-size:13.5px;margin-top:3px}
  .apa{display:flex;gap:8px;align-items:flex-start;margin-top:14px;background:#F0EEE7;border-radius:8px;padding:9px 12px;font-size:12px;color:#4a453b;line-height:1.5}
  .apa .lbl{font-weight:600;color:var(--green);white-space:nowrap}
  .apa .cite{flex:1}
  .apa .cite i{font-style:italic}
  .apa button{border:none;background:none;color:var(--accent);cursor:pointer;font-size:11.5px;font-family:var(--sans);white-space:nowrap;padding:0}
  .r-controls{display:flex;justify-content:space-between;align-items:center;margin-top:14px;gap:10px;flex-wrap:wrap}
  .r-hint{font-size:11.5px;color:var(--ink-soft)}
  .r-body{padding:8px 26px 26px}
  .para{position:relative;padding:12px 40px 12px 14px;border-radius:9px;margin:2px -14px;transition:background .15s}
  .para:hover{background:#F6F3EC}
  .para .en{font-family:var(--serif);font-style:italic;color:var(--ink-soft);font-size:14px;display:block;margin-bottom:5px}
  .para .zh{font-size:14.5px;color:#33302a}
  .para .save{position:absolute;top:9px;right:8px;border:1px solid var(--line);background:var(--card);border-radius:7px;width:30px;height:30px;cursor:pointer;color:var(--ink-soft);opacity:0;transition:.15s;display:flex;align-items:center;justify-content:center}
  .para:hover .save{opacity:1}
  .para .save:hover{border-color:var(--accent);color:var(--accent)}
  .figure{border:1px solid var(--line);border-radius:11px;padding:16px;margin:14px 0;background:#fff;position:relative}
  .figure figcaption{font-size:12px;color:var(--ink-soft);margin-top:10px;text-align:center;font-style:italic}
  .figure .save{position:absolute;top:10px;right:10px}

  /* Notes */
  .note{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);position:relative}
  .note .rm{position:absolute;top:12px;right:14px;border:none;background:none;color:var(--ink-soft);cursor:pointer;font-size:17px;line-height:1}
  .note .qk{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:8px}
  .note .qk.fig{color:var(--green)}
  .note .ex-en{font-family:var(--serif);font-style:italic;color:var(--ink-soft);font-size:13.5px;margin-bottom:5px}
  .note .ex-zh{font-size:14.5px;color:#33302a;margin-bottom:11px}
  .note .n-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:11px}
  .note .n-tags span{font-size:11px;color:var(--ink-soft);background:#F0EEE7;padding:2px 9px;border-radius:6px}
  .note .n-src{display:flex;gap:8px;align-items:flex-start;font-size:11.5px;color:#4a453b;border-top:1px dashed var(--line);padding-top:10px;line-height:1.5}
  .note .n-src .lbl{color:var(--green);font-weight:600;white-space:nowrap}
  .note .n-src i{font-style:italic}
  .note .n-src button{border:none;background:none;color:var(--accent);cursor:pointer;font-size:11px;white-space:nowrap;font-family:var(--sans);padding:0}
  .note figure{margin:0 0 11px}
  .note figure svg{max-width:100%;height:auto}

  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:24px;font-size:13px;z-index:60;opacity:0;transition:.25s;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.25)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .m-nav{display:none}
  @media (max-width:860px){
    .shell{grid-template-columns:1fr}
    .side{position:static;height:auto;border-right:none;border-bottom:1px solid var(--line);padding:20px 18px;gap:16px}
    .side nav.tabs,.side .datanote{display:none}
    main{padding:22px 18px 92px}
    .head h2{font-size:23px}
    .m-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);z-index:30;box-shadow:0 -4px 20px rgba(35,32,27,.06)}
    .m-nav button{flex:1;border:none;background:none;padding:10px 2px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--ink-soft);font-family:var(--sans);font-size:10.5px;position:relative}
    .m-nav button.active{color:var(--accent)}
    .m-nav .mbadge{position:absolute;top:5px;right:50%;transform:translateX(16px);background:var(--accent);color:#fff;font-size:9px;min-width:15px;height:15px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 3px}
    .overlay{padding:0}
    .reader{max-width:none;border-radius:0;min-height:100vh}
    .r-head,.r-body{padding-left:18px;padding-right:18px}
  }
  @media (max-width:420px){.meter{width:60px}.meter .num{font-size:20px}.paper{padding:17px 16px}}
</style>
</head>
<body>
<div class="shell">
  <aside class="side">
    <div class="brand">
      <div class="mark"><span class="dot"></span><h1>研究雷达</h1></div>

</div>

<script>
const TOPICS=["价值共创","居民参与","节事/事件","互动仪式链","情感互动品质","推-拉动因","自我决定理论","社区/文化遗产","澳门"];

const FIG_EVOL=`<svg viewBox="0 0 460 150" xmlns="http://www.w3.org/2000/svg" font-family="Spectral,serif">
<defs><marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0l6 3-6 3z" fill="#B23A2E"/></marker></defs>
<rect x="20" y="52" width="110" height="46" rx="8" fill="#F3E2DE" stroke="#B23A2E"/><text x="75" y="72" text-anchor="middle" font-size="12" fill="#7c2f26">初始 · 外在</text><text x="75" y="88" text-anchor="middle" font-size="10" fill="#7c2f26">动因微弱·单一</text>
<rect x="175" y="52" width="110" height="46" rx="8" fill="#F6E7D9" stroke="#B0842F"/><text x="230" y="72" text-anchor="middle" font-size="12" fill="#8a6414">中期 · 过渡</text><text x="230" y="88" text-anchor="middle" font-size="10" fill="#8a6414">强度提升·叠加</text>
<rect x="330" y="52" width="110" height="46" rx="8" fill="#E2ECE7" stroke="#2F5D4E"/><text x="385" y="72" text-anchor="middle" font-size="12" fill="#2F5D4E">深化 · 内在</text><text x="385" y="88" text-anchor="middle" font-size="10" fill="#2F5D4E">强烈·多元·内化</text>
<line x1="132" y1="75" x2="171" y2="75" stroke="#B23A2E" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="287" y1="75" x2="326" y2="75" stroke="#B23A2E" stroke-width="1.5" marker-end="url(#ar)"/>
<text x="230" y="28" text-anchor="middle" font-size="12" font-style="italic" fill="#6E695E">动因的三重并行演化</text></svg>`;

const FIG_IR=`<svg viewBox="0 0 420 190" xmlns="http://www.w3.org/2000/svg" font-family="Spectral,serif">
<defs><marker id="ar2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0l6 3-6 3z" fill="#2F5D4E"/></marker></defs>

<rect x="20" y="72" width="130" height="34" rx="7" fill="#E2ECE7" stroke="#2F5D4E"/><text x="85" y="93" text-anchor="middle" font-size="11" fill="#2F5D4E">相互关注</text>

<line x1="152" y1="89" x2="247" y2="93" stroke="#2F5D4E" stroke-width="1.4" marker-end="url(#ar2)"/>
<line x1="152" y1="141" x2="247" y2="102" stroke="#2F5D4E" stroke-width="1.4" marker-end="url(#ar2)"/>
<text x="210" y="180" text-anchor="middle" font-size="11" font-style="italic" fill="#6E695E">互动仪式的组成要素与结果（Collins, 2004）</text></svg>`;

function P(en,zh){return {en,zh}}

const TODAY=[
 {id:'t1',rel:94,venue:'Tourism Management · 2026',type:'new',
  zh:'节庆情境下居民价值共创的情感触发机制：一项多阶段追踪研究',en:'Emotional triggers of resident value co-creation in festival settings',
  authors:'L. Chen, M. Ferreira, K. Wong',

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1900)}
async function copy(text,msg){try{await navigator.clipboard.writeText(text)}catch(e){const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove()}toast(msg||'已复制')}
function stripTags(s){return s.replace(/<[^>]+>/g,'')}

function renderTopics(){const box=document.getElementById('topics');box.innerHTML='';TOPICS.forEach(t=>{const c=document.createElement('span');c.className='chip'+(filter===t?' on':'');c.textContent=t;c.onclick=()=>{filter=(filter===t?null:t);renderTopics();renderFeed()};box.appendChild(c)})}

function abstractHTML(p){const lang=cardLang[p.id]||'zh';let h='';if(lang==='en'||lang==='both')h+=`<span class="en">${p.absEn}</span>`;if(lang==='zh'||lang==='both')h+=`${p.abstract}`;return h}

function paperCard(p){

 const el=document.createElement('article');el.className='paper'+(isC?' is-classic':'');
 el.innerHTML=`
  <div class="p-top">
   <div class="meter"><div class="num ${isC?'classic':''}">${relNum?p.rel+'<span style="font-size:13px">%</span>':p.rel}</div>
    <div class="lab">${relNum?'相关度':'地位'}</div>
    <div class="bar"><i class="${isC?'classic':''}" style="width:${relNum?p.rel:100}%"></i></div></div>
   <div class="p-body">
    <div class="venue"><span class="type ${p.type}">${isC?'经典':'最新'}</span>${p.venue}</div>
    <div class="p-title">${p.zh}</div><div class="p-title-en">${p.en}</div>
    <div class="authors">${p.authors}</div>
    <div class="langbar" data-id="${p.id}">
      <button data-l="zh" class="${lang==='zh'?'on':''}">中文</button>
      <button data-l="en" class="${lang==='en'?'on':''}">EN</button>
      <button data-l="both" class="${lang==='both'?'on':''}">双语</button></div>
   </div></div>
  <div class="abstract">${abstractHTML(p)}</div>
  <div class="why"><b>◆ 为什么值得你读</b><span>${p.why}</span></div>
  <div class="tags">${p.tags.map(t=>`<span>${t}</span>`).join('')}</div>
  <div class="p-actions">
   <button class="btn primary read">${isC?'查看并阅读':'双语阅读全文'}</button>
   <button class="btn fav ${faved?'on':''}">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="${faved?'currentColor':'none'}" stroke="currentColor" stroke-width="1.8"><path d="M12 4l2.4 4.9 5.4.8-3.9 3.8.9 5.4-4.8-2.5-4.8 2.5.9-5.4L5.2 9.7l5.4-.8L12 4z"/></svg>
    ${faved?'已收藏':'收藏'}</button></div>`;
 el.querySelector('.fav').onclick=()=>toggleFav(p.id);
 el.querySelector('.read').onclick=()=>openReader(p.id);
 el.querySelectorAll('.langbar button').forEach(b=>b.onclick=()=>{cardLang[p.id]=b.dataset.l;renderFeed()});
 return el;
}

 headEl.innerHTML=`<div class="kick">${h.kick}</div><h2>${h.t}</h2><p>${h.p}</p>${toolsHTML}`;
 if(activeTab==='today'){
   bannerEl.innerHTML = REAL
    ? `<div class="demo-banner" style="background:var(--green-tint);border-color:#BcD3CA;color:#22503f"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 6L9 17l-5-5"/></svg><span><b>实时数据 · OpenAlex</b>　更新于 ${REAL_META||'刚刚'}，共 ${TODAY.length} 篇，按你的研究画像打分排序。</span></div>`
    : `<div class="demo-banner"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 8v5m0 3h.01"/></svg><span><b>演示数据</b>：未检测到 papers.json，当前为占位示例。跑一次 fetch_openalex.py 并本地起服务，这里就会换成真实的每日新论文。</span></div>`;
 } else { bannerEl.innerHTML=''; }
 if(activeTab==='notes'){renderNotes();bindNoteTools();return}
 let list=currentList();if(filter)list=list.filter(p=>p.tags.includes(filter));
 feed.innerHTML='';
 if(!list.length){feed.innerHTML=emptyBox();return}
 list.forEach(p=>feed.appendChild(paperCard(p)));
}

 notes.slice().reverse().forEach(n=>{
  const p=byId(n.pid);
  const el=document.createElement('article');el.className='note';
  const body=n.type==='figure'
    ? `<figure>${n.svg}<figcaption style="font-size:12px;color:var(--ink-soft);text-align:center;font-style:italic;margin-top:6px">${n.cap}</figcaption></figure>`
    : `<div class="ex-en">${n.en}</div><div class="ex-zh">${n.zh}</div>`;
  el.innerHTML=`
   <button class="rm" title="删除">×</button>
   <div class="qk ${n.type==='figure'?'fig':''}">${n.type==='figure'?'◧ 图形摘录':'❝ 段落摘录'} · ${n.time}</div>
   ${body}
   <div class="n-tags">${p.tags.map(t=>`<span>${t}</span>`).join('')}</div>
   <div class="n-src"><span class="lbl">APA 来源</span><span class="cite">${p.apa}</span><button class="cp">复制</button></div>`;
  el.querySelector('.rm').onclick=()=>{notes=notes.filter(x=>x!==n);updateBadges();renderFeed()};
  el.querySelector('.cp').onclick=()=>copy(stripTags(p.apa),'APA 引用已复制');
  feed.appendChild(el);
 });
}

function bindNoteTools(){
 const ex=document.getElementById('exportBtn'),cl=document.getElementById('clearBtn');
 if(ex)ex.onclick=()=>{
   const out=notes.map((n,i)=>{const p=byId(n.pid);const excerpt=n.type==='figure'?`[图] ${n.cap}`:`${n.zh}\n${n.en}`;return `${i+1}. ${excerpt}\n   来源：${stripTags(p.apa)}\n   标签：${p.tags.join('、')}`}).join('\n\n');
   copy(out,`已复制 ${notes.length} 条笔记`);
 };
 if(cl)cl.onclick=()=>{if(confirm('清空全部笔记？')){notes=[];updateBadges();renderFeed()}};
}

/* Reader */
function openReader(id){readerId=id;readerLang='both';renderReader();document.getElementById('overlay').classList.add('show');document.body.style.overflow='hidden'}
function closeReader(){document.getElementById('overlay').classList.remove('show');document.body.style.overflow='';readerId=null}
function renderReader(){
 const p=byId(readerId);if(!p)return;
 const paras=p.paras||[P(p.absEn,p.abstract)];
 let bodyHTML='';
 paras.forEach((pr,i)=>{
  let inner='';
  if(readerLang==='en'||readerLang==='both')inner+=`<span class="en">${pr.en}</span>`;
  if(readerLang==='zh'||readerLang==='both')inner+=`<span class="zh">${pr.zh}</span>`;
  bodyHTML+=`<div class="para">${inner}<button class="save" data-i="${i}" title="记入笔记">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 4h11l3 3v13H5z"/><path d="M9 4v4h6"/><path d="M9 13h6"/></svg></button></div>`;
 });
 if(p.fig)bodyHTML+=`<figure class="figure">${p.fig.svg}<figcaption>${p.fig.cap}</figcaption>
   <button class="save savefig" title="记入笔记">
   <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 4h11l3 3v13H5z"/><path d="M9 4v4h6"/></svg></button></figure>`;
 document.getElementById('reader').innerHTML=`
  <div class="r-head"><button class="close" title="关闭">×</button>
   <div class="rv">${p.venue} · ${p.authors}</div>
   <h3>${p.zh}</h3><div class="rh-en">${p.en}</div>
   <div class="apa"><span class="lbl">APA</span><span class="cite">${p.apa}</span><button id="apaCopy">复制引用</button></div>
   <div class="r-controls">
    <div class="langbar">
     <button data-l="zh" class="${readerLang==='zh'?'on':''}">中文</button>
     <button data-l="en" class="${readerLang==='en'?'on':''}">EN</button>
     <button data-l="both" class="${readerLang==='both'?'on':''}">双语对照</button></div>
    <span class="r-hint">悬停段落 → 点右侧图标记入笔记</span></div>
  </div>
  <div class="r-body">${bodyHTML}</div>`;
 const R=document.getElementById('reader');
 R.querySelector('.close').onclick=closeReader;
 R.querySelector('#apaCopy').onclick=()=>copy(stripTags(p.apa),'APA 引用已复制');
 R.querySelectorAll('.langbar button').forEach(b=>b.onclick=()=>{readerLang=b.dataset.l;renderReader()});
 R.querySelectorAll('.para .save').forEach(b=>b.onclick=()=>saveNote(p.id,+b.dataset.i));
 const sf=R.querySelector('.savefig');if(sf)sf.onclick=()=>saveFig(p.id);
}

function saveNote(pid,i){const p=byId(pid);const pr=(p.paras||[P(p.absEn,p.abstract)])[i];
 notes.push({pid,type:'text',en:pr.en,zh:pr.zh,time:stamp()});updateBadges();toast('已记入学习笔记 · 来源已按 APA 记录')}
function saveFig(pid){const p=byId(pid);notes.push({pid,type:'figure',svg:p.fig.svg,cap:p.fig.cap,time:stamp()});updateBadges();toast('图形已记入笔记')}
function stamp(){const d=new Date();return `${d.getMonth()+1}月${d.getDate()}日 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}

function toggleFav(id){favs.has(id)?favs.delete(id):favs.add(id);updateBadges();renderFeed()}
function updateBadges(){
 document.getElementById('b-today').textContent=TODAY.length;
 document.getElementById('b-classic').textContent=CLASSIC.length;
 document.getElementById('b-notes').textContent=notes.length;
 document.getElementById('b-fav').textContent=favs.size;
 [['mb-notes',notes.length],['mb-fav',favs.size]].forEach(([id,v])=>{const e=document.getElementById(id);e.style.display=v?'flex':'none';e.textContent=v});
}
function setTab(tab){activeTab=tab;filter=null;renderTopics();
 document.querySelectorAll('#deskTabs .tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
 document.querySelectorAll('#mNav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
 renderFeed();window.scrollTo({top:0,behavior:'smooth'})}

document.querySelectorAll('#deskTabs .tab').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
document.querySelectorAll('#mNav button').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
document.getElementById('overlay').onclick=e=>{if(e.target.id==='overlay')closeReader()};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeReader()});

async function loadReal(){
 try{
  const r=await fetch('papers.json',{cache:'no-store'});
  if(!r.ok) throw 0;
  const j=await r.json();
  if(j&&Array.isArray(j.papers)&&j.papers.length){
   TODAY.length=0;
   j.papers.forEach(p=>TODAY.push(Object.assign({type:'new'},p)));
   REAL=true; REAL_META=j.generated_at?j.generated_at.replace('T',' '):null;
  }
 }catch(e){/* 保持演示数据 */}
 updateBadges(); if(activeTab==='today') renderFeed();
}

renderTopics();updateBadges();renderFeed();loadReal();
</script>
</body>
</html>
